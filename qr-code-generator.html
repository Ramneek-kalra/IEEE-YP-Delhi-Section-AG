<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script>
        function uploadCSV() {
            const input = document.getElementById('csvInput');
            const reader = new FileReader();
            reader.onload = function (event) {
                const text = event.target.result;
                const lines = text.split('\n');
                const jsonData = lines.map(line => {
                    const [name, data] = line.split(',');
                    return { name, data };
                });
                generateQRCode(jsonData);
            };
            reader.readAsText(input.files[0]);
        }

        function generateQRCode(data) {
            const qrContainer = document.getElementById('qrCodes');
            qrContainer.innerHTML = '';
            data.forEach(item => {
                const qrCode = document.createElement('div');
                qrCode.innerHTML = '<h3>' + item.name + '</h3>'; // Display the name
                const qr = document.createElement('img');
                qr.src = 'https://api.qrserver.com/v1/create-qr-code/?data=' + encodeURIComponent(item.data);
                qrCode.appendChild(qr);
                qrContainer.appendChild(qrCode);
            });
        }

        function batchDownload() {
            const qrCodes = document.querySelectorAll('#qrCodes img');
            let zip = new JSZip();
            let count = 0;

            qrCodes.forEach((qr, index) => {
                fetch(qr.src)
                    .then(res => res.blob())
                    .then(blob => {
                        zip.file('QRCode' + index + '.png', blob);
                        count++;
                        if (count === qrCodes.length) {
                            zip.generateAsync({ type: 'blob' }).then(content => {
                                const a = document.createElement('a');
                                const url = URL.createObjectURL(content);
                                a.href = url;
                                a.download = 'QRCodes.zip';
                                a.click();
                                URL.revokeObjectURL(url);
                            });
                        }
                    });
            });
        }
    </script>
</head>
<body>
    <h1>QR Code Generator</h1>
    <input type="file" id="csvInput" accept="text/csv">
    <button onclick="uploadCSV()">Upload CSV</button>
    <div id="qrCodes"></div>
    <button onclick="batchDownload()">Download All QR Codes</button>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>
</html>
