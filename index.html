<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Check-In Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the Event Check-In Manager</h1>
    </header>
    <main>
        <form id="checkInForm">
            <label for="attendee">Attendee Name:</label>
            <input type="text" id="attendee" name="attendee" required>
            <button type="submit">Check In</button>
        </form>
        <div id="attendanceList">
            <h2>Checked-In Attendees</h2>
            <ul id="list"></ul>
        </div>
    </main>
    <script>
        const form = document.getElementById('checkInForm');
        const list = document.getElementById('list');

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            const attendeeName = document.getElementById('attendee').value;
            const li = document.createElement('li');
            li.textContent = attendeeName;
            list.appendChild(li);
            form.reset();
        });
    </script>
</body>
</html>
